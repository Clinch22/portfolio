<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart | SmartShop</title>
  <meta name="description" content="Review SmartShop cart items, update quantities, and proceed to checkout.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="icon" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/products.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/cart.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/cart-page.js"></script>
</head>
<body>
  <header class="site-header"></header>
  <main class="container">
    <section class="page-hero"><span class="eyebrow">Cart</span><h1>Your selected items.</h1><p>Adjust quantities, check totals, and continue into the demo checkout flow.</p></section>
    <section class="cart-layout">
      <div class="panel" data-cart-page-items></div>
      <aside class="panel panel-pad" data-cart-summary></aside>
    </section>
  </main>
  <footer class="site-footer"></footer>
</body>
</html>
